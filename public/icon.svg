<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#f0ebe2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 3 stacked boxes (boxes metaphor) -->
  <g transform="translate(96 96)">
    <!-- back (release / gray) -->
    <rect x="40" y="40" width="240" height="200" rx="16" fill="#f1f3f5" stroke="#6c757d" stroke-width="6"/>
    <!-- middle (later / blue) -->
    <rect x="20" y="80" width="240" height="200" rx="16" fill="#e6f1fa" stroke="#1d4e89" stroke-width="6"/>
    <!-- front (today / green) -->
    <rect x="0" y="120" width="240" height="200" rx="16" fill="#e8f5ee" stroke="#2d6a4f" stroke-width="6"/>
    <!-- lid dashed -->
    <line x1="0" y1="160" x2="240" y2="160" stroke="#2d6a4f" stroke-width="4" stroke-dasharray="6 6" opacity="0.5"/>
    <!-- two leaves as leaf shape -->
    <g transform="translate(120 230)">
      <path d="M 0 40 C -30 30 -30 -10 0 -30 C 30 -10 30 30 0 40 Z" fill="#2d6a4f" opacity="0.85"/>
      <line x1="0" y1="40" x2="0" y2="-20" stroke="#1b4332" stroke-width="3"/>
      <path d="M -25 10 C -10 0 10 0 25 10" stroke="#1b4332" stroke-width="2" fill="none" opacity="0.5"/>
    </g>
  </g>
</svg>
